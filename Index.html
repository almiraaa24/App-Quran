<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran App Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#059669'
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .arabic {
            font-family: 'Amiri', serif;
        }

        /* HERO */
        .hero-bg {
            background:
                linear-gradient(to bottom, rgba(5, 150, 105, 0.4), rgba(2, 6, 23, 0.9)),
                url('https://i.ibb.co.com/SCPFnH7/Whats-App-Image-2026-04-18-at-05-42-53.jpg');
            background-size: cover;
            background-position: center;
        }

        /* CARD */
        .card {
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
    <!-- ICONIFY (WAJIB ADA DI HEAD / ATAS) -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- NAV -->
    <nav class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">

        <!-- LOGO -->
        <div class="flex items-center gap-2">
            <iconify-icon icon="mdi:quran" class="text-2xl text-primary"></iconify-icon>
            <h1 class="font-bold text-primary">Quran App</h1>
        </div>

        <!-- TOGGLE DARK MODE -->
        <button id="theme-toggle" class="text-xl p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">

            <iconify-icon id="theme-icon" icon="mdi:weather-night"></iconify-icon>

        </button>

    </nav>
    <!-- HERO AWAL -->
    <header class="hero-bg text-white text-center py-16 px-6">
        <h2 class="text-3xl font-bold mb-2">Al-Qur'anul Karim</h2>
        <p class="text-white/80 mb-6">
            Aplikasi Al-Qur'an digital modern untuk membaca kapan saja
        </p>

        <input id="search-input" type="text" placeholder="Cari surat..."
            class="w-full max-w-xl mx-auto p-4 rounded-full text-black outline-none">
    </header>

    <!-- FILTER -->
    <section class="max-w-6xl mx-auto p-6 flex justify-between">
        <div>
            <button onclick="switchTab('surat')" id="tab-surat"
                class="px-4 py-2 bg-primary text-white rounded">Surat</button>
        </div>

        <select id="sort-select" onchange="handleSort()" class="p-2 rounded">
            <option value="asc">1-114</option>
            <option value="desc">114-1</option>
        </select>
    </section>

    <!-- MAIN -->
    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div id="surah-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="read-container" class="hidden max-w-3xl mx-auto"></div>
    </main>

    <audio id="main-audio"></audio>

    <script>
        let allSurahs = [];
        let currentView = 'surat';
        const audioPlayer = document.getElementById('main-audio');

        // INIT
        async function init() {
            const res = await fetch('https://equran.id/api/v2/surat');
            const json = await res.json();
            allSurahs = json.data;
            renderSurat(allSurahs);
        }

        // RENDER SURAT
        function renderSurat(data) {
            const container = document.getElementById('surah-container');
            document.getElementById('read-container').classList.add('hidden');
            container.classList.remove('hidden');

            container.innerHTML = data.map(s => `
        <div onclick="openSurah(${s.nomor})"
            class="card bg-white dark:bg-gray-800 p-5 rounded-xl shadow cursor-pointer">

            <div class="flex justify-between mb-3">
                <span class="text-primary font-bold">${s.nomor}</span>
                <span class="arabic text-xl text-primary">${s.nama}</span>
            </div>

            <h3 class="font-semibold">${s.namaLatin}</h3>
            <p class="text-sm text-gray-500">${s.arti} • ${s.jumlahAyat} Ayat</p>
        </div>
    `).join('');
        }

        // RENDER JUZ
        function renderJuz() {
            const container = document.getElementById('surah-container');
            container.innerHTML = '';

            for (let i = 1; i <= 30; i++) {
                container.innerHTML += `
        <div onclick="openJuz(${i})"
            class="card bg-white dark:bg-gray-800 p-5 rounded-xl shadow cursor-pointer">

            <h3 class="font-bold">Juz ${i}</h3>
        </div>`;
            }
        }

        // OPEN JUZ
        async function openJuz(id) {
            const container = document.getElementById('surah-container');
            const read = document.getElementById('read-container');

            container.classList.add('hidden');
            read.classList.remove('hidden');

            read.innerHTML = "Loading Juz...";

            const res = await fetch(`https://equran.id/api/v2/juz/${id}`);
            const json = await res.json();
            const d = json.data;

            read.innerHTML = `
    <button onclick="backToList()">← Kembali</button>
    <h1 class="text-2xl font-bold mb-6">Juz ${id}</h1>

    ${d.ayat.map(a => `
        <div class="bg-white dark:bg-gray-800 p-5 rounded mb-4">
            <div class="arabic text-right text-3xl">${a.teksArab}</div>
            <div>${a.teksIndonesia}</div>
        </div>
    `).join('')}
    `;
        }

        // ✅ FIXED OPEN SURAH (INI YANG TADI ERROR)
        async function openSurah(nomor) {
            window.scrollTo(0, 0);

            const container = document.getElementById('surah-container');
            const read = document.getElementById('read-container');

            container.classList.add('hidden');
            read.classList.remove('hidden');

            read.innerHTML = "Loading...";

            const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
            const json = await res.json();
            const d = json.data;

            read.innerHTML = `
    <button onclick="backToList()" class="mb-6 text-primary">
        ← Kembali
    </button>

    <div class="hero-bg text-white p-8 rounded-3xl mb-10 text-center">
        <h1 class="text-3xl font-bold">${d.namaLatin}</h1>
        <p class="text-white/80 mb-4">${d.arti} • ${d.jumlahAyat} Ayat</p>
        <div class="arabic text-3xl">
            بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم
        </div>
    </div>

    <div class="space-y-6">
        ${d.ayat.map(a => `
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">

            <div class="flex justify-between mb-3">
                <span class="text-primary">${a.nomorAyat}</span>
                <button onclick="playAudio('${a.audio['05']}', this)" 
class="w-10 h-10 flex items-center justify-center 
rounded-full border border-primary text-primary 
hover:bg-primary hover:text-white transition">

    <iconify-icon icon="mdi:play" class="text-lg"></iconify-icon>

</button>
            </div>

            <div class="arabic text-right text-3xl mb-3">
                ${a.teksArab}
            </div>

            <div class="text-primary italic text-sm">
                ${a.teksLatin}
            </div>

            <div class="text-gray-600 dark:text-gray-300">
                ${a.teksIndonesia}
            </div>

        </div>
        `).join('')}
    </div>
    `;
        }

        // AUDIO
        function playAudio(url) {
            audioPlayer.src = url;
            audioPlayer.play();
        }

        // SEARCH (INI SUDAH FIX)
        document.getElementById('search-input').addEventListener('input', e => {
            const val = e.target.value.toLowerCase();
            const filtered = allSurahs.filter(s =>
                s.namaLatin.toLowerCase().includes(val)
            );
            renderSurat(filtered);
        });

        // TAB
        function switchTab(tab) {
            currentView = tab;
            if (tab === 'surat') {
                renderSurat(allSurahs);
            } else {
                renderJuz();
            }
        }

        // SORT
        function handleSort() {
            const val = document.getElementById('sort-select').value;
            const sorted = [...allSurahs].sort((a, b) =>
                val === 'asc' ? a.nomor - b.nomor : b.nomor - a.nomor
            );
            renderSurat(sorted);
        }

        // BACK
        function backToList() {
            renderSurat(allSurahs);
        }

        // DARK MODE
        document.getElementById('theme-toggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
        };

        init();
    </script>

</body>

</html>
